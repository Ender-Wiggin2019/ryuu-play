<div class="ptcg-search-box">
  <form class="search-form" autocomplete="off">
    <mat-form-field floatLabel="never" appearance="legacy">
      <input
        name="searchValue"
        (ngModelChange)="onChange($event)"
        [(ngModel)]="searchValue"
        type="text" matInput [placeholder]="'BUTTON_SEARCH' | translate">
    </mat-form-field>
    <button mat-button
      [matTooltip]="'BUTTON_CLEAR_FILTER' | translate"
      matTooltipShowDelay="1000"
      (click)="clearSearch()">
      <mat-icon matSuffix >close</mat-icon>
    </button>
  </form>
</div>
