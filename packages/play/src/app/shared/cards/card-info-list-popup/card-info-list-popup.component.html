<h2 mat-dialog-title class="ptcg-card-dialog-title">
  <span translate>CARDS_LIST_OF_CARDS</span>
  <span class="ptcg-dialog-count" *ngIf="cardList?.cards?.length">{{ cardList.cards.length }}</span>
</h2>

<mat-dialog-content class="ptcg-card-dialog-content">
  <ptcg-card-list-pane
    [selected]="card"
    [cardList]="cardList"
    [facedown]="facedown"
    (cardClick)="showCardInfo($event)">
  </ptcg-card-list-pane>
</mat-dialog-content>

<mat-dialog-actions class="ptcg-card-dialog-actions">
  <section class="ptcg-card-info-reveal-cards" *ngIf="allowReveal">
    <mat-checkbox color="primary" name="reveal-card"
      [checked]="!facedown" (change)="facedown = !facedown">
      {{ 'CARDS_REVEAL_CARDS' | translate }}
    </mat-checkbox>
  </section>
  <span class="ptcg-u-spacer"></span>
  <button mat-raised-button (click)="close()">
    {{ 'BUTTON_CLOSE' | translate }}
  </button>
</mat-dialog-actions>
